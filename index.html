<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Image Gallery</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Responsive Image Gallery</h1>
    <p>HTML • CSS • JavaScript</p>
  </header>

  <!-- Filter Buttons -->
  <div class="filter-buttons">
    <button class="active" onclick="filterImages('all', event)">All</button>
    <button onclick="filterImages('nature', event)">Nature</button>
    <button onclick="filterImages('city', event)">City</button>
    <button onclick="filterImages('animals', event)">Animals</button>
  </div>

  <!-- Gallery -->
  <div class="gallery">

    <div class="gallery-item nature">
      <img src="https://picsum.photos/id/1015/600/400" alt="Nature" onclick="openLightbox(0)">
    </div>

    <div class="gallery-item city">
      <img src="https://picsum.photos/id/1011/600/400" alt="City" onclick="openLightbox(1)">
    </div>

    <div class="gallery-item animals">
      <img src="https://picsum.photos/id/1025/600/400" alt="Animal" onclick="openLightbox(2)">
    </div>

    <div class="gallery-item nature">
      <img src="https://picsum.photos/id/1039/600/400" alt="Nature" onclick="openLightbox(3)">
    </div>

    <div class="gallery-item city">
      <img src="https://picsum.photos/id/1043/600/400" alt="City" onclick="openLightbox(4)">
    </div>

    <div class="gallery-item animals">
      <img src="https://picsum.photos/id/1062/600/400" alt="Animal" onclick="openLightbox(5)">
    </div>

  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>

    <button class="nav-btn prev" onclick="changeImage(-1)">&#10094;</button>

    <img id="lightbox-img" src="">

    <button class="nav-btn next" onclick="changeImage(1)">&#10095;</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
